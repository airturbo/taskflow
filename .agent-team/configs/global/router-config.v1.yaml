# Router Configuration — Multi-Role Agent Team
# Used by scripts/router.py for intent classification and role matching
# Project-local override: {project}/.agent-team/configs/global/router-config.v1.yaml

schema_version: "1.0"

# Intent classifier keyword lists
# Router scans user input (lowercased) for these keywords
intent_classifier:
  # Matches → readonly_query intent
  readonly_keywords:
    # Chinese
    - "查看"
    - "看看"
    - "查询"
    - "了解"
    - "目前"
    - "当前"
    - "进展"
    - "状态"
    - "进度"
    - "是什么"
    - "有哪些"
    - "怎么样"
    - "多少"
    - "列出"
    - "展示"
    - "概述"
    - "摘要"
    - "总结"
    - "说明"
    - "描述"
    - "区别"
    - "对比"
    - "分析一下"
    # English
    - "show"
    - "list"
    - "describe"
    - "what is"
    - "status"
    - "progress"
    - "summary"
    - "overview"
    - "how many"
    - "current"
    - "explain"
    - "compare"

  # Matches → explicit_change intent
  change_keywords:
    # Chinese
    - "修改"
    - "更新"
    - "变更"
    - "新增"
    - "添加"
    - "删除"
    - "移除"
    - "创建"
    - "生成"
    - "编写"
    - "重构"
    - "调整"
    - "改为"
    - "替换"
    - "升级"
    - "回退"
    - "回滚"
    - "发布"
    - "部署"
    - "合并"
    - "冻结基线"
    - "审批"
    - "批准"
    - "推进到"
    - "切换到"
    # English
    - "create"
    - "update"
    - "modify"
    - "change"
    - "add"
    - "remove"
    - "delete"
    - "refactor"
    - "deploy"
    - "release"
    - "rollback"
    - "freeze"
    - "approve"
    - "advance to"
    - "switch to"

# Default routing behavior
defaults:
  # When intent is ambiguous, route to this role for clarification
  fallback_owner: "project_manager_orchestrator"

  # When no role matches, use this role
  default_role: "project_manager_orchestrator"

  # Confidence threshold (reserved for future LLM-based classification)
  min_confidence: 0.6

# Stage → role priority mapping (when multiple roles match, prefer the stage-active role)
stage_priority:
  intake: "project_manager_orchestrator"
  scoped: "product_manager"
  design_in_progress: "ui_ux_designer"
  architecture_in_progress: "system_architect"
  implementation_in_progress: null  # could be frontend or backend
  security_review: "security_compliance_engineer"
  test_preparation: "qa_engineer"
  testing: "qa_engineer"
  ux_review: "user_experience_officer"
  release_preparation: "devops_engineer"
  release_ready: "project_manager_orchestrator"
  released: "devops_engineer"
  post_release_analysis: "data_analyst"
  rolled_back: "devops_engineer"
  archived: "project_manager_orchestrator"
